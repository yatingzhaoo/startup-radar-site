name: Daily startup radar update

on:
  schedule:
    - cron: "17 0 * * *"
      timezone: "America/Los_Angeles"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-startup-radar-update
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate and verify today's feed
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          test -n "$DEEPSEEK_API_KEY"
          TODAY="$(TZ=America/Los_Angeles date +%F)"
          node scripts/generate-static-day.mjs "$TODAY"
          node scripts/validate-static-feed.mjs "$TODAY"
          npm run build

      - name: Save the successful feed
        run: |
          TODAY="$(TZ=America/Los_Angeles date +%F)"
          git config user.name "daily-startup-radar-bot"
          git config user.email "daily-startup-radar-bot@users.noreply.github.com"
          git add src/data/feed.json
          if git diff --cached --quiet; then
            echo "No content change"
            exit 0
          fi
          git commit -m "Update startup radar ${TODAY}"
          git push
